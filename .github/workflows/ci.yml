name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace

  feature-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: warp-link no-default-features
        run: cargo check -p warp-link --no-default-features
      - name: warp-link quic
        run: cargo check -p warp-link --no-default-features --features quic
      - name: warp-link tcp
        run: cargo check -p warp-link --no-default-features --features tcp
      - name: warp-link wss
        run: cargo check -p warp-link --no-default-features --features wss
      - name: warp-link all
        run: cargo check -p warp-link --all-features
      - name: warp-link-ffi no-default-features
        run: cargo check -p warp-link-ffi --no-default-features
      - name: warp-link-ffi all
        run: cargo check -p warp-link-ffi --all-features
